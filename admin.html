<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Бегу к себе — админ</title>
<style>
  :root{
    --bg:#0a0a0a;
    --bg-card:#161616;
    --bg-card-2:#1e1e1e;
    --lime:#ccff00;
    --white:#ffffff;
    --gray:#8a8a8a;
    --gray-dim:#444;
    --red:#ff4d4d;
    --border:#2a2a2a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:var(--bg);
    color:var(--white);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }
  body{padding-bottom:40px;min-height:100vh;}
  .wrap{max-width:680px;margin:0 auto;padding:0 16px;}

  .header{padding:22px 16px 14px;border-bottom:1px solid var(--border);}
  .header .wrap{display:flex;align-items:center;justify-content:space-between;}
  .brand{font-weight:900;font-size:15px;letter-spacing:0.5px;}
  .brand .lime-dot{color:var(--lime);}
  .logout-btn{
    background:none;border:1px solid var(--border);color:var(--gray);
    padding:7px 14px;border-radius:100px;font-size:12px;font-weight:700;
    cursor:pointer;
  }

  .title-block{padding:20px 0 6px;}
  .title-block h1{font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:-0.3px;}
  .title-block p{color:var(--gray);font-size:13px;margin-top:4px;font-weight:500;}

  .stat-row{display:flex;gap:10px;margin:18px 0;}
  .stat-mini{
    flex:1;background:var(--bg-card);border:1px solid var(--border);
    border-radius:12px;padding:12px 14px;
  }
  .stat-mini .l{font-size:10px;color:var(--gray);text-transform:uppercase;font-weight:800;letter-spacing:0.3px;}
  .stat-mini .v{font-family:monospace;font-size:20px;font-weight:700;margin-top:4px;}
  .stat-mini .v.lime{color:var(--lime);}

  .search-box{margin-bottom:14px;}
  .search-box input{
    width:100%;background:var(--bg-card);border:1px solid var(--border);
    border-radius:12px;padding:12px 14px;color:var(--white);
    font-size:14px;font-family:inherit;
  }
  .search-box input:focus{outline:none;border-color:var(--lime);}

  .student-card{
    background:var(--bg-card);border:1px solid var(--border);
    border-radius:14px;padding:14px 16px;margin-bottom:10px;
  }
  .student-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .student-name{font-size:15px;font-weight:800;}
  .student-key{font-size:11px;color:var(--gray);font-weight:600;margin-top:2px;}
  .student-stats{display:flex;gap:16px;margin-bottom:12px;}
  .student-stats .item{font-size:12px;color:var(--gray);font-weight:600;}
  .student-stats .item b{color:var(--white);font-family:monospace;font-weight:700;}
  .student-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .mini-btn{
    flex:1;min-width:120px;
    padding:9px 10px;border-radius:9px;border:1px solid var(--border);
    background:var(--bg-card-2);color:var(--white);
    font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  .mini-btn.danger{border-color:#4a1414;color:var(--red);}
  .mini-btn:active{opacity:0.8;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--gray);}
  .empty-state p{font-size:13px;font-weight:600;}

  /* ===== LOGIN ===== */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.75);
    display:flex;align-items:center;justify-content:center;
    z-index:100;padding:20px;
  }
  .modal-box{
    background:var(--bg-card);border:1px solid var(--border);
    border-radius:18px;padding:26px 22px;max-width:340px;width:100%;
  }
  .modal-box h2{font-size:20px;font-weight:900;text-transform:uppercase;margin-bottom:6px;}
  .modal-box .sub{font-size:13px;color:var(--gray);margin-bottom:18px;font-weight:500;line-height:1.4;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.3px;color:var(--gray);margin-bottom:7px;}
  .field input{
    width:100%;background:var(--bg-card-2);border:1px solid var(--border);
    border-radius:12px;padding:13px 14px;color:var(--white);font-size:16px;font-weight:600;font-family:inherit;
  }
  .field input:focus{outline:none;border-color:var(--lime);}
  .btn{width:100%;padding:15px;border-radius:12px;border:none;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:0.4px;cursor:pointer;font-family:inherit;}
  .btn-primary{background:var(--lime);color:#0a0a0a;}
  .login-error{color:var(--red);font-size:12px;font-weight:600;margin-bottom:12px;display:none;}

  .toast{
    position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-20px);
    background:var(--lime);color:#0a0a0a;padding:10px 18px;border-radius:100px;
    font-size:13px;font-weight:800;z-index:200;opacity:0;transition:all .25s;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .hidden{display:none !important;}
</style>
</head>
<body>

<div id="loginOverlay" class="modal-overlay">
  <div class="modal-box">
    <h2>Админка</h2>
    <p class="sub">Доступ только для организатора курса.</p>
    <div class="field">
      <label>Пароль администратора</label>
      <input type="password" id="adminPassInput" placeholder="••••••••" autocomplete="off">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" onclick="checkAdminPassword()">Войти</button>
  </div>
</div>

<div id="appBody" class="hidden">
  <div class="header">
    <div class="wrap">
      <div class="brand">БЕГУ К СЕБЕ <span class="lime-dot">●</span> ADMIN</div>
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="wrap">
    <div class="title-block">
      <h1>Управление учениками</h1>
      <p>Сброс паролей, очистка истории, удаление. Имя — то, что ввёл ученик при регистрации, код входа — его уникальный идентификатор в системе.</p>
    </div>

    <div class="stat-row">
      <div class="stat-mini">
        <div class="l">Учеников</div>
        <div class="v" id="statTotalStudents">0</div>
      </div>
      <div class="stat-mini">
        <div class="l">Всего тренировок</div>
        <div class="v" id="statTotalWorkouts">0</div>
      </div>
      <div class="stat-mini">
        <div class="l">Суммарно км</div>
        <div class="v lime" id="statTotalKm">0</div>
      </div>
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Поиск по имени..." oninput="renderStudents()">
    </div>

    <div id="studentsList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ====== тот же конфиг, что и в основном приложении ====== */
const firebaseConfig = {
  apiKey: "AIzaSyBfoZFaBD07qnj6JqMyOnFvmH29kTeRJUE",
  authDomain: "run-track-1660c.firebaseapp.com",
  databaseURL: "https://run-track-1660c-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "run-track-1660c",
  storageBucket: "run-track-1660c.firebasestorage.app",
  messagingSenderId: "196895339070",
  appId: "1:196895339070:web:2b8ecc0e04ae30e19dd76f",
  measurementId: "G-HDND9SR7RB"
};

/* ====== ПАРОЛЬ АДМИНКИ — поменяй на свой ====== */
const ADMIN_PASSWORD = "begu2026";

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

let allStudents = [];

function checkAdminPassword(){
  const val = document.getElementById('adminPassInput').value;
  const errEl = document.getElementById('loginError');
  if(val === ADMIN_PASSWORD){
    sessionStorage.setItem('rk_admin_ok', '1');
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('appBody').classList.remove('hidden');
    loadAllData();
  }else{
    errEl.textContent = 'Неверный пароль';
    errEl.style.display = 'block';
  }
}

function logout(){
  sessionStorage.removeItem('rk_admin_ok');
  location.reload();
}

function tryAutoLogin(){
  if(sessionStorage.getItem('rk_admin_ok') === '1'){
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('appBody').classList.remove('hidden');
    loadAllData();
  }
}

async function loadAllData(){
  showToast('Загрузка данных...');
  const [authSnap, workoutsSnap, goalsSnap, lbSnap] = await Promise.all([
    get(ref(db, 'auth')),
    get(ref(db, 'workouts')),
    get(ref(db, 'goals')),
    get(ref(db, 'leaderboard'))
  ]);

  const authData = authSnap.exists() ? authSnap.val() : {};
  const workoutsData = workoutsSnap.exists() ? workoutsSnap.val() : {};
  const goalsData = goalsSnap.exists() ? goalsSnap.val() : {};
  const lbData = lbSnap.exists() ? lbSnap.val() : {};

  const allKeys = new Set([
    ...Object.keys(authData),
    ...Object.keys(workoutsData),
    ...Object.keys(lbData)
  ]);

  allStudents = Array.from(allKeys).map(key=>{
    const workouts = workoutsData[key] ? Object.values(workoutsData[key]) : [];
    const totalKm = workouts.reduce((s,w)=>s+(w.dist||0),0);
    const displayName = (authData[key] && authData[key].displayName) || (lbData[key] && lbData[key].name) || key;
    return {
      key: key,
      displayName: displayName,
      hasPassword: !!authData[key],
      workoutCount: workouts.length,
      totalKm: totalKm,
      hasGoal: !!goalsData[key]
    };
  });

  allStudents.sort((a,b)=> b.totalKm - a.totalKm);

  document.getElementById('statTotalStudents').textContent = allStudents.length;
  document.getElementById('statTotalWorkouts').textContent = allStudents.reduce((s,st)=>s+st.workoutCount,0);
  document.getElementById('statTotalKm').textContent = allStudents.reduce((s,st)=>s+st.totalKm,0).toFixed(1);

  renderStudents();
}

function renderStudents(){
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const list = document.getElementById('studentsList');

  let filtered = allStudents;
  if(search){
    filtered = allStudents.filter(s=> s.displayName.toLowerCase().includes(search) || s.key.includes(search));
  }

  if(filtered.length===0){
    list.innerHTML = '<div class="empty-state"><p>Никого не найдено</p></div>';
    return;
  }

  list.innerHTML = filtered.map(s=>`
    <div class="student-card">
      <div class="student-top">
        <div>
          <div class="student-name">${escapeHtml(s.displayName)}</div>
          <div class="student-key">код входа: ${escapeHtml(s.key)}${s.hasPassword ? '' : ' · пароль не задан'}</div>
        </div>
      </div>
      <div class="student-stats">
        <div class="item">Тренировок: <b>${s.workoutCount}</b></div>
        <div class="item">Всего км: <b>${s.totalKm.toFixed(1)}</b></div>
        <div class="item">Цель: <b>${s.hasGoal ? 'есть' : 'нет'}</b></div>
      </div>
      <div class="student-actions">
        <button class="mini-btn" onclick="resetPassword('${s.key}','${escapeAttr(s.displayName)}')">Сбросить пароль</button>
        <button class="mini-btn" onclick="clearHistory('${s.key}','${escapeAttr(s.displayName)}')">Очистить историю</button>
        <button class="mini-btn danger" onclick="deleteStudent('${s.key}','${escapeAttr(s.displayName)}')">Удалить полностью</button>
      </div>
    </div>
  `).join('');
}

async function resetPassword(key, name){
  if(!confirm(`Сбросить пароль для "${name}"? Он сможет задать новый при следующем входе.`)) return;
  await remove(ref(db, 'auth/'+key));
  showToast('Пароль сброшен');
  loadAllData();
}

async function clearHistory(key, name){
  if(!confirm(`Удалить ВСЕ тренировки и цель "${name}"? Имя и пароль останутся.`)) return;
  await remove(ref(db, 'workouts/'+key));
  await remove(ref(db, 'goals/'+key));
  await set(ref(db, 'leaderboard/'+key), {name: name, totalKm: 0, updated: Date.now()});
  showToast('История очищена');
  loadAllData();
}

async function deleteStudent(key, name){
  if(!confirm(`Удалить "${name}" ПОЛНОСТЬЮ — имя, пароль, тренировки, цель, место в рейтинге? Это нельзя отменить.`)) return;
  await Promise.all([
    remove(ref(db, 'auth/'+key)),
    remove(ref(db, 'workouts/'+key)),
    remove(ref(db, 'goals/'+key)),
    remove(ref(db, 'leaderboard/'+key))
  ]);
  showToast('Ученик удалён');
  loadAllData();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str){
  return String(str).replace(/'/g, "\\'").replace(/"/g,'&quot;');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

window.checkAdminPassword = checkAdminPassword;
window.logout = logout;
window.renderStudents = renderStudents;
window.resetPassword = resetPassword;
window.clearHistory = clearHistory;
window.deleteStudent = deleteStudent;

window.addEventListener('DOMContentLoaded', ()=>{
  tryAutoLogin();
  document.getElementById('adminPassInput').addEventListener('keydown',(e)=>{
    if(e.key==='Enter') checkAdminPassword();
  });
});
</script>
</body>
</html>
